<!--
  Google Search Console Verification File
  =======================================
  
  Cara Setup Google Search Console:
  
  1. Buka https://search.google.com/search-console
  2. Klik "Add Property" → Pilih "URL prefix"
  3. Masukkan: https://resourceful-eagerness-production-bb8d.up.railway.app
  4. Pilih metode verifikasi "HTML file"
  5. Download file verifikasi dari Google (contoh: google123abc456.html)
  6. Rename file tersebut menjadi google-site-verification.html (ganti file ini)
  7. Deploy ulang ke Railway
  8. Klik "Verify" di Google Search Console
  
  Alternatif: Gunakan meta tag verification (sudah disediakan di layout.tsx)
  
  Meta Tag Verification (Copy dari Google Search Console):
  <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE" />
  
  Tempatkan di app/layout.tsx dalam tag <head>
-->

<!DOCTYPE html>
<html>
<head>
  <title>Google Search Console Verification</title>
  <meta name="robots" content="noindex">
</head>
<body>
  <h1>Google Search Console Verification</h1>
  <p>This file is used to verify ownership of the website in Google Search Console.</p>
  <p>Replace this file with the verification file downloaded from Google Search Console.</p>
</body>
</html>
