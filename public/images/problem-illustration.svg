<div class="border-t border-r border-b border-zinc-800/60 pt-12 pr-12 pb-16"><h3 class="text-zinc-200 font-medium text-xl mb-3">Intelligent Progress Tracking</h3><p class="text-zinc-500 text-base mb-8">Automated guidance and monitoring keeps students on track. AI agents provide real-time feedback, suggesting next steps based on progress and deadlines.</p><div class="bg-zinc-900/30 border border-zinc-800/60 rounded-xl p-5"><div class="flex items-center gap-2 mb-5"><svg class="w-4 h-4 text-zinc-500" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0L9.5 5.5L15 7L9.5 8.5L8 14L6.5 8.5L1 7L6.5 5.5L8 0Z"></path></svg><span class="text-zinc-500 text-sm">Research <span class="text-zinc-300">Progress</span></span></div><div class="flex items-center gap-3 mb-3"><span class="text-zinc-600 text-sm w-20">Next Steps</span><div class="flex items-center gap-2"><span class="flex items-center gap-1.5 rounded-md px-2 py-1 text-sm" style="background: rgb(113, 112, 255);"><span class="w-4 h-4 bg-white/30 rounded-full"></span><span class="text-white">Literature Review</span></span><span class="flex items-center gap-1.5 bg-zinc-800/30 rounded-md px-2 py-1 text-sm text-zinc-600"><span class="w-3 h-3 border border-zinc-700 rounded"></span>Methodology Design</span><span class="flex items-center gap-1.5 text-sm text-zinc-700"><span class="w-2 h-2 bg-zinc-600 rounded-full"></span>Schedule</span></div></div><div class="flex items-center gap-3 mb-3"><span class="text-zinc-600 text-sm w-20">Timeline</span></div><div class="flex items-center gap-3 mb-4"><span class="text-zinc-600 text-sm w-20">Milestones</span></div><div class="bg-zinc-800/40 rounded-lg p-4 ml-4"><div class="flex items-center gap-2 mb-3"><span class="w-5 h-5 bg-zinc-600 rounded-full"></span><span class="text-zinc-300 text-sm font-medium">Literature Review Phase</span></div><p class="text-zinc-500 text-xs mb-2">Recommended Actions</p><p class="text-zinc-500 text-sm mb-4">Based on your research question, start with 15-20 foundational papers in your field. Focus on recent systematic reviews and meta-analyses first.</p><p class="text-zinc-500 text-xs mb-2">Alternative Approaches</p><div class="flex items-center gap-2 mb-4"><span class="flex items-center gap-1.5 bg-zinc-700/50 rounded-md px-2 py-1 text-sm"><span class="w-4 h-4 bg-zinc-500 rounded-full"></span><span class="text-zinc-400">Scope-focused</span></span><span class="flex items-center gap-1.5 bg-zinc-700/50 rounded-md px-2 py-1 text-sm"><span class="w-4 h-4 bg-zinc-500 rounded-full"></span><span class="text-zinc-400">Chronological</span></span></div><button class="w-full flex items-center justify-center gap-2 bg-zinc-700/50 hover:bg-zinc-600/50 text-zinc-300 text-sm py-2.5 rounded-md transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-check w-4 h-4"><path d="M20 6 9 17l-5-5"></path></svg>Start Phase</button></div></div></div>